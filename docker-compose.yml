version: '3.9'

services:

  api:
    build: .
    ports:
      - "8000:8000"

  postgres:
    image: postgres:15

    environment:
      POSTGRES_DB: healthauth
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: healthauthai_enterprise_v2-redis-1
    ports:
      - "6379:6379"
    restart: always