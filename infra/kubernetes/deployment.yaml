env:
- name: DATABASE_URL
  valueFrom:
    secretKeyRef:
      name: healthauth-db-secrets
      key: database-url

- name: REDIS_URL
  value: "redis://healthauth-redis-service:6379/0"

- name: JWT_SECRET_KEY
  valueFrom:
    secretKeyRef:
      name: healthauth-jwt-secrets
      key: secret-key

- name: OPENAI_API_KEY
  valueFrom:
    secretKeyRef:
      name: healthauth-openai-secrets
      key: openai-api-key

- name: ENV
  value: "PROD"
